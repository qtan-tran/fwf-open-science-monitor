services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fwf_monitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fwf_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the container reaches db by service name.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fwf_monitor
      NODE_ENV: production

  etl:
    build: ./etl
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fwf_monitor
      FWF_API_URL: ${FWF_API_URL:-https://openapi.fwf.ac.at}
      FWF_API_KEY: ${FWF_API_KEY}
    # One-shot job — never restart automatically.
    restart: "no"
    # Only start when explicitly requested:
    #   docker compose --profile etl up etl
    #   docker compose run etl
    #   docker compose run etl python -m src.pipeline --metrics-only
    profiles:
      - etl

volumes:
  pgdata:
