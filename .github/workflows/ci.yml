name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & type-check (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx next lint

      - name: Type-check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  test-etl:
    name: Test (ETL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (web)
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test-frontend, test-etl]
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          # Build-time DATABASE_URL is only needed for Prisma introspection;
          # the schema is already committed so any valid-format URL works here.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fwf_monitor
          NEXT_TELEMETRY_DISABLED: "1"
